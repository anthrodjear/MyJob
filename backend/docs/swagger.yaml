      parameters:
      - description: Filter by entity type
        enum:
        - job
        - application
        - resume
        - cover_letter
        - interview
        - email
        - approval
        in: query
        name: entity_type
        type: string
      - description: Filter by entity UUID
        in: query
        name: entity_id
        type: string
      - description: Filter by event type
        enum:
        - created
        - updated
        - deleted
        - status_changed
        - scored
        - applied
        - email_received
        - interview_scheduled
        in: query
        name: event_type
        type: string
      - description: Filter by start time (RFC3339)
        in: query
        name: start_time
        type: string
      - description: Filter by end time (RFC3339)
        in: query
        name: end_time
        type: string
      - default: 20
        description: Results per page (max 100)
        in: query
        maximum: 100
        minimum: 1
        name: limit
        type: integer
      - default: 0
        description: Pagination offset
        in: query
        minimum: 0
        name: offset
        type: integer
