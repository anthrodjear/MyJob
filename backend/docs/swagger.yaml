        "400":
          description: Invalid query parameters
          schema:
            $ref: '#/definitions/backend_internal_httpresp.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/backend_internal_httpresp.ErrorResponse'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/backend_internal_httpresp.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List activity logs
      tags:
      - Activity
  /activity-logs/{id}:
    get:
      consumes:
      - application/json
      description: Get a single activity log entry by its UUID
      parameters:
      - description: Activity Log UUID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
