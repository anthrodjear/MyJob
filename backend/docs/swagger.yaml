        - offer
        - recruiter_outreach
        - other
        example: interview_invitation
        type: string
      from_address:
        example: recruiter@company.com
        type: string
      message_id:
        example: <abc123@company.com>
        type: string
      received_at:
        example: "2026-06-20T10:00:00Z"
