    email: support@example.com
    name: API Support
    url: https://github.com/your-org/ai-job-search-agent/issues
  description: Local-first AI-powered job search automation platform. Discovers, scores,
    and applies to jobs with tailored resumes and cover letters.
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: https://github.com/your-org/ai-job-search-agent
  title: AI Job Search Agent API
  version: "1.0"
paths:
  /activity-logs:
    get:
      consumes:
      - application/json
