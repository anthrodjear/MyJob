# .github/workflows/test-runner.yml
# Test self-hosted runner and k3s connectivity

name: Test Runner

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted
    env:
      KUBECONFIG: /home/dark/.kube/config
    steps:
      - name: Test connection
        run: |
          echo "Hello from self-hosted runner!"
          echo "Hostname: $(hostname)"
          echo "User: $(whoami)"
          echo "PWD: $(pwd)"
          echo "Date: $(date)"

      - name: Check Docker
        run: |
          echo "=== Docker Version ==="
          docker --version
          docker compose version
          echo ""
          echo "=== Running Containers ==="
          docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"

      - name: Check k3s
        run: |
          echo "=== k3s Status ==="
          sudo systemctl status k3s --no-pager || echo "k3s not running"
          echo ""
          echo "=== k3s Nodes ==="
          kubectl get nodes
          echo ""
          echo "=== k3s Pods ==="
          kubectl get pods -A

      - name: Check Helm
        run: |
          if command -v helm &> /dev/null; then
            echo "Helm: $(helm version --short)"
            echo ""
            echo "=== Helm Releases ==="
            helm list -A
          else
            echo "Helm not installed"
          fi

      - name: Check Go
        run: |
          if command -v go &> /dev/null; then
            echo "Go: $(go version)"
          else
            echo "Go not installed"
          fi

      - name: Check Node
        run: |
          if command -v node &> /dev/null; then
            echo "Node: $(node --version)"
            echo "npm: $(npm --version)"
          else
            echo "Node not installed"
          fi
