# .github/workflows/cd.yml
# CD Pipeline — deploy via Kubernetes (Helm) or Docker Compose
#
# Triggers: after CI passes on main, or manual dispatch
# Staging: auto-deploy on push to main
# Production: manual approval required

name: CD Pipeline

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      image_tag:
        description: 'Image tag to deploy (e.g., sha-abc1234)'
        required: false
        default: ''
      deploy_method:
        description: 'Deploy method'
        required: true
        default: 'kubernetes'
        type: choice
        options:
          - kubernetes
          - docker-compose

concurrency:
  group: cd-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  HELM_CHART_PATH: k8s/helm/myjob

jobs:
  # ---------------------------------------------------------------------------
  # Determine what to deploy
  # ---------------------------------------------------------------------------
  prepare:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.resolve-tag.outputs.tag }}
      environment: ${{ steps.resolve-env.outputs.env }}
      deploy_url: ${{ steps.resolve-env.outputs.url }}
      deploy_method: ${{ steps.resolve-method.outputs.method }}
    steps:
      - name: Resolve environment
        id: resolve-env
        env:
          INPUT_ENV: ${{ github.event.inputs.environment }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "env=$INPUT_ENV" >> $GITHUB_OUTPUT
          else
            echo "env=staging" >> $GITHUB_OUTPUT
          fi

          ENV="$(cat $GITHUB_OUTPUT | grep '^env=' | cut -d= -f2)"
          if [ "$ENV" = "staging" ]; then
            echo "url=${{ vars.STAGING_URL }}" >> $GITHUB_OUTPUT
          else
            echo "url=${{ vars.PRODUCTION_URL }}" >> $GITHUB_OUTPUT
          fi

      - name: Resolve image tag
        id: resolve-tag
        env:
          INPUT_IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          if [ -n "$INPUT_IMAGE_TAG" ]; then
            echo "tag=$INPUT_IMAGE_TAG" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "tag=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          else
            echo "tag=sha-${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          fi

      - name: Resolve deploy method
        id: resolve-method
        env:
          INPUT_DEPLOY_METHOD: ${{ github.event.inputs.deploy_method }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "method=$INPUT_DEPLOY_METHOD" >> $GITHUB_OUTPUT
          else
            echo "method=kubernetes" >> $GITHUB_OUTPUT
          fi

      - name: Validate CI passed
        if: github.event_name == 'workflow_run'
        run: |
          if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
            echo "ERROR: CI pipeline did not pass"
            exit 1
          fi

  # ===========================================================================
  # Kubernetes Deployment (Helm)
  # ===========================================================================

  deploy-k8s-staging:
    needs: prepare
    if: needs.prepare.outputs.environment == 'staging' && needs.prepare.outputs.deploy_method == 'kubernetes'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ needs.prepare.outputs.deploy_url }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.15.0'

      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy to staging via Helm
        run: |
          helm upgrade --install myjob-staging ${{ env.HELM_CHART_PATH }} \
            --namespace myjob-staging \
            --create-namespace \
            --set api.image.repository="$REPO-api" \
            --set api.image.tag="$TAG" \
            --set api.image.pullPolicy=Always \
            --set worker.image.repository="$REPO-worker" \
            --set worker.image.tag="$TAG" \
            --set worker.image.pullPolicy=Always \
            --set browserAgent.image.repository="$REPO-browser-agent" \
            --set browserAgent.image.tag="$TAG" \
            --set browserAgent.image.pullPolicy=Always \
            --set frontend.image.repository="$REPO-frontend" \
            --set frontend.image.tag="$TAG" \
            --set frontend.image.pullPolicy=Always \
            --set secrets.database.secretName=myjob-staging-database \
            --set secrets.auth.secretName=myjob-staging-auth \
            --set secrets.livekit.secretName=myjob-staging-livekit \
            --set secrets.ollama.baseUrl="$OLLAMA_URL" \
            --set ingress.hosts[0].host="$STAGING_HOST" \
            --set ingress.hosts[0].paths[0].path="/" \
            --set ingress.hosts[0].paths[0].pathType=Prefix \
            --set ingress.hosts[0].paths[0].service=frontend \
            --set ingress.hosts[0].paths[0].port=3000 \
            --set ingress.hosts[0].paths[1].path="/api" \
            --set ingress.hosts[0].paths[1].pathType=Prefix \
            --set ingress.hosts[0].paths[1].service=api \
            --set ingress.hosts[0].paths[1].port=8080 \
            --wait \
            --timeout 5m
        env:
          TAG: ${{ needs.prepare.outputs.image_tag }}
          REPO: ${{ env.IMAGE_PREFIX }}
          OLLAMA_URL: ${{ vars.OLLAMA_BASE_URL }}
          STAGING_HOST: ${{ vars.STAGING_HOST }}

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/myjob-staging-api -n myjob-staging --timeout=300s
          kubectl rollout status deployment/myjob-staging-worker -n myjob-staging --timeout=300s
          kubectl rollout status deployment/myjob-staging-frontend -n myjob-staging --timeout=300s

      - name: Health check
        run: |
          sleep 10
          chmod +x scripts/ci-health-check.sh
          API_URL="https://${{ vars.STAGING_HOST }}/api" \
          FRONTEND_URL="https://${{ vars.STAGING_HOST }}" \
          scripts/ci-health-check.sh

  deploy-k8s-production:
    needs: prepare
    if: needs.prepare.outputs.environment == 'production' && needs.prepare.outputs.deploy_method == 'kubernetes'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ needs.prepare.outputs.deploy_url }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.15.0'

      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Confirm production deployment
        run: |
          echo "::warning::Deploying ${{ needs.prepare.outputs.image_tag }} to PRODUCTION Kubernetes cluster"

      - name: Deploy to production via Helm
        run: |
          helm upgrade --install myjob-production ${{ env.HELM_CHART_PATH }} \
            --namespace myjob-production \
            --create-namespace \
            --set api.image.repository="$REPO-api" \
            --set api.image.tag="$TAG" \
            --set api.image.pullPolicy=Always \
            --set api.replicaCount=3 \
            --set api.resources.requests.cpu=500m \
            --set api.resources.requests.memory=512Mi \
            --set api.resources.limits.cpu=2000m \
            --set api.resources.limits.memory=1Gi \
            --set worker.image.repository="$REPO-worker" \
            --set worker.image.tag="$TAG" \
            --set worker.image.pullPolicy=Always \
            --set worker.replicaCount=3 \
            --set worker.resources.requests.cpu=500m \
            --set worker.resources.requests.memory=512Mi \
            --set worker.resources.limits.cpu=2000m \
            --set worker.resources.limits.memory=1Gi \
            --set browserAgent.image.repository="$REPO-browser-agent" \
            --set browserAgent.image.tag="$TAG" \
            --set browserAgent.image.pullPolicy=Always \
            --set browserAgent.replicaCount=2 \
            --set frontend.image.repository="$REPO-frontend" \
            --set frontend.image.tag="$TAG" \
            --set frontend.image.pullPolicy=Always \
            --set frontend.replicaCount=3 \
            --set secrets.database.secretName=myjob-production-database \
            --set secrets.auth.secretName=myjob-production-auth \
            --set secrets.livekit.secretName=myjob-production-livekit \
            --set secrets.ollama.baseUrl="$OLLAMA_URL" \
            --set ingress.hosts[0].host="$PROD_HOST" \
            --set ingress.hosts[0].paths[0].path="/" \
            --set ingress.hosts[0].paths[0].pathType=Prefix \
            --set ingress.hosts[0].paths[0].service=frontend \
            --set ingress.hosts[0].paths[0].port=3000 \
            --set ingress.hosts[0].paths[1].path="/api" \
            --set ingress.hosts[0].paths[1].pathType=Prefix \
            --set ingress.hosts[0].paths[1].service=api \
            --set ingress.hosts[0].paths[1].port=8080 \
            --set ingress.tls[0].secretName=myjob-production-tls \
            --set ingress.tls[0].hosts[0]="$PROD_HOST" \
            --set pdb.minAvailable=2 \
            --wait \
            --timeout 10m
        env:
          TAG: ${{ needs.prepare.outputs.image_tag }}
          REPO: ${{ env.IMAGE_PREFIX }}
          OLLAMA_URL: ${{ vars.OLLAMA_BASE_URL }}
          PROD_HOST: ${{ vars.PRODUCTION_HOST }}

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/myjob-production-api -n myjob-production --timeout=600s
          kubectl rollout status deployment/myjob-production-worker -n myjob-production --timeout=600s
          kubectl rollout status deployment/myjob-production-frontend -n myjob-production --timeout=600s

      - name: Health check
        run: |
          sleep 15
          chmod +x scripts/ci-health-check.sh
          API_URL="https://${{ vars.PRODUCTION_HOST }}/api" \
          FRONTEND_URL="https://${{ vars.PRODUCTION_HOST }}" \
          MAX_RETRIES=15 \
          scripts/ci-health-check.sh

      - name: Rollback on failure
        if: failure()
        run: |
          echo "::error::Production deployment failed — rolling back Helm release"
          helm rollback myjob-production -n myjob-production --wait --timeout 5m

  # ===========================================================================
  # Docker Compose Deployment (fallback)
  # ===========================================================================

  deploy-docker-staging:
    needs: prepare
    if: needs.prepare.outputs.environment == 'staging' && needs.prepare.outputs.deploy_method == 'docker-compose'
    runs-on: ubuntu-latest
    environment:
      name: staging
      url: ${{ needs.prepare.outputs.deploy_url }}
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.STAGING_HOST }}
          username: ${{ secrets.STAGING_USER }}
          key: ${{ secrets.STAGING_SSH_KEY }}
          script: |
            set -euo pipefail
            DEPLOY_DIR="${{ vars.DEPLOY_DIR || '/opt/myjob' }}"
            TAG="${{ needs.prepare.outputs.image_tag }}"
            cd "$DEPLOY_DIR"

            export API_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:$TAG"
            export WORKER_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-worker:$TAG"
            export BROWSER_AGENT_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-browser-agent:$TAG"
            export FRONTEND_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:$TAG"

            docker compose pull api worker browser-agent frontend
            docker compose up -d --no-deps api
            sleep 5
            docker compose up -d --no-deps worker
            sleep 5
            docker compose up -d --no-deps browser-agent
            sleep 5
            docker compose up -d --no-deps frontend
            echo "=== Deploy complete ==="

      - name: Health check
        run: |
          sleep 15
          chmod +x scripts/ci-health-check.sh
          API_URL="${{ needs.prepare.outputs.deploy_url }}/api" \
          FRONTEND_URL="${{ needs.prepare.outputs.deploy_url }}" \
          scripts/ci-health-check.sh

  deploy-docker-production:
    needs: prepare
    if: needs.prepare.outputs.environment == 'production' && needs.prepare.outputs.deploy_method == 'docker-compose'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ needs.prepare.outputs.deploy_url }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Confirm deployment
        run: |
          echo "::warning::Deploying ${{ needs.prepare.outputs.image_tag }} to PRODUCTION"

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            set -euo pipefail
            DEPLOY_DIR="${{ vars.DEPLOY_DIR || '/opt/myjob' }}"
            TAG="${{ needs.prepare.outputs.image_tag }}"
            cd "$DEPLOY_DIR"

            # Backup for rollback
            docker compose ps -q > /tmp/myjob-containers-backup.txt
            CURRENT_TAG=$(grep "image:" docker-compose.yml | head -1 | awk '{print $2}' | cut -d: -f2)
            echo "$CURRENT_TAG" > /tmp/myjob-previous-tag.txt

            export API_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:$TAG"
            export WORKER_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-worker:$TAG"
            export BROWSER_AGENT_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-browser-agent:$TAG"
            export FRONTEND_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:$TAG"

            docker compose pull api worker browser-agent frontend
            docker compose up -d --no-deps api
            sleep 10
            docker compose up -d --no-deps worker
            sleep 10
            docker compose up -d --no-deps browser-agent
            sleep 10
            docker compose up -d --no-deps frontend
            echo "=== Deploy complete ==="

      - name: Health check
        run: |
          sleep 20
          chmod +x scripts/ci-health-check.sh
          API_URL="${{ needs.prepare.outputs.deploy_url }}/api" \
          FRONTEND_URL="${{ needs.prepare.outputs.deploy_url }}" \
          MAX_RETRIES=15 \
          scripts/ci-health-check.sh

      - name: Rollback on failure
        if: failure()
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            set -euo pipefail
            DEPLOY_DIR="${{ vars.DEPLOY_DIR || '/opt/myjob' }}"
            PREV_TAG=$(cat /tmp/myjob-previous-tag.txt 2>/dev/null || echo "unknown")
            echo "=== ROLLING BACK to $PREV_TAG ==="
            cd "$DEPLOY_DIR"
            export API_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api:$PREV_TAG"
            export WORKER_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-worker:$PREV_TAG"
            export BROWSER_AGENT_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-browser-agent:$PREV_TAG"
            export FRONTEND_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-frontend:$PREV_TAG"
            docker compose pull api worker browser-agent frontend
            docker compose up -d --force-recreate
            echo "=== Rollback complete ==="

  # ---------------------------------------------------------------------------
  # CD Summary
  # ---------------------------------------------------------------------------
  cd-summary:
    needs: [prepare, deploy-k8s-staging, deploy-k8s-production, deploy-docker-staging, deploy-docker-production]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Deployment Summary
        run: |
          echo "## CD Pipeline Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Environment | ${{ needs.prepare.outputs.environment }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | ${{ needs.prepare.outputs.image_tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy Method | ${{ needs.prepare.outputs.deploy_method }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Deploy URL | ${{ needs.prepare.outputs.deploy_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| K8s Staging | ${{ needs.deploy-k8s-staging.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| K8s Production | ${{ needs.deploy-k8s-production.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Staging | ${{ needs.deploy-docker-staging.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Docker Production | ${{ needs.deploy-docker-production.result }} |" >> $GITHUB_STEP_SUMMARY
