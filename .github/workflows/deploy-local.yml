# .github/workflows/deploy-local.yml
# Deploy to local server via self-hosted runner

name: Deploy Local

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-local-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - run: echo "CI passed"

  deploy:
    needs: validate
    runs-on: self-hosted
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and deploy
        run: docker compose up -d --build --force-recreate

      - name: Wait for services
        run: sleep 30

      - name: Health check
        run: |
          curl -sf http://localhost:8080/health || echo "API not ready"
          curl -sf http://localhost:3000 || echo "Frontend not ready"

      - name: Status
        run: docker compose ps

  rollback:
    needs: deploy
    if: failure()
    runs-on: self-hosted
    steps:
      - name: Checkout previous
        uses: actions/checkout@v4
        with:
          ref: HEAD~1

      - name: Rollback
        run: |
          docker compose down
          docker compose up -d --build