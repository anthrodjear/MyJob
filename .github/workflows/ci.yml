name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  COMPOSE_FILE: docker-compose.yml:docker-compose.ci.yml

jobs:
  # ============================================
  # Stage 1: Unit Tests (no Docker)
  # ============================================

  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum

      - name: Run tests
        working-directory: backend
        run: go test ./... -count=1 -timeout 120s

  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci --no-audit --no-fund

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: frontend
        run: npm test -- --run

  test-browser-agent:
    name: Browser Agent Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: browser-agent/package-lock.json

      - name: Install dependencies
        working-directory: browser-agent
        run: npm ci --no-audit --no-fund

      - name: Type check
        working-directory: browser-agent
        run: npx tsc --noEmit

      - name: Run tests
        working-directory: browser-agent
        run: npm test

  # ============================================
  # Stage 2: Lint
  # ============================================

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache-dependency-path: backend/go.sum

      - name: Go vet
        working-directory: backend
        run: go vet ./...

      - name: Install golangci-lint v2 (from source for Go 1.26 compat)
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest

      - name: golangci-lint
        working-directory: backend
        run: golangci-lint run --config ../.golangci.yml

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Frontend type check
        working-directory: frontend
        run: npm ci --no-audit --no-fund && npx tsc --noEmit

      - name: Browser agent type check
        working-directory: browser-agent
        run: npm ci --no-audit --no-fund && npx tsc --noEmit

  # ============================================
  # Stage 3: Docker Build
  # ============================================

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all images
        run: docker compose build
        env:
          DOCKER_BUILDKIT: 1
          COMPOSE_DOCKER_CLI_BUILD: 1

      - name: Verify images exist
        run: |
          docker images --format "{{.Repository}}:{{.Tag}}" | grep myjob || true
          docker compose config --quiet

  # ============================================
  # Stage 4: Integration Tests
  # ============================================

  integration:
    name: Integration Tests
    needs: [test-backend, test-frontend, test-browser-agent, docker-build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Start infrastructure
        run: |
          docker compose up -d postgres redis
          echo "Waiting for infrastructure to be healthy..."
          timeout 30 bash -c 'until docker compose ps postgres | grep -q "healthy"; do sleep 2; done'
          timeout 30 bash -c 'until docker compose ps redis | grep -q "healthy"; do sleep 2; done'
          echo "Infrastructure is healthy!"

      - name: Start API (auto-runs migrations)
        run: |
          docker compose up -d api
          echo "Waiting for API to become healthy (includes migration time)..."
          timeout 120 bash -c 'until docker compose exec -T api wget -qO- http://localhost:8080/health >/dev/null 2>&1; do sleep 5; done'
          echo "API is healthy!"

      - name: Start remaining services
        run: |
          docker compose up -d worker browser-agent frontend

      - name: Wait for all services to be healthy
        run: |
          echo "Waiting for worker..."
          timeout 30 bash -c 'until docker compose ps worker | grep -q "healthy"; do sleep 2; done'
          
          echo "Waiting for browser-agent..."
          timeout 30 bash -c 'until docker compose ps browser-agent | grep -q "healthy"; do sleep 2; done'
          
          echo "Waiting for frontend..."
          timeout 30 bash -c 'until docker compose ps frontend | grep -q "healthy"; do sleep 2; done'
          
          echo "All services are healthy!"

      - name: Verify all services healthy
        run: |
          echo "=== Service Status ==="
          docker compose ps
          echo ""
          echo "=== Health Checks ==="
          docker compose ps --format "{{.Name}}: {{.Status}}"
          echo ""

          # Check API health
          echo "API health:"
          docker compose exec -T api wget -qO- http://localhost:8080/health || echo "API health check failed"

          # Check frontend
          echo "Frontend:"
          curl -sf http://localhost:3000 >/dev/null && echo "Frontend OK" || echo "Frontend failed"

          # Check browser-agent
          echo "Browser agent:"
          curl -sf http://localhost:3001/health >/dev/null && echo "Browser agent OK" || echo "Browser agent health endpoint not available (expected)"

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "=== API Logs ==="
          docker compose logs api --tail=50
          echo ""
          echo "=== Worker Logs ==="
          docker compose logs worker --tail=50
          echo ""
          echo "=== Browser Agent Logs ==="
          docker compose logs browser-agent --tail=50
          echo ""
          echo "=== Frontend Logs ==="
          docker compose logs frontend --tail=50

      - name: Cleanup
        if: always()
        run: docker compose down -v
