{{- if .Values.browserAgent.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-browser-agent
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "myjob.labels" . | nindent 4 }}
    app.kubernetes.io/component: browser-agent
spec:
  {{- if not .Values.browserAgent.autoscaling.enabled }}
  replicas: {{ .Values.browserAgent.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "myjob.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: browser-agent
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "myjob.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: browser-agent
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: browser-agent
          image: {{ include "myjob.browserAgent.image" . }}
          imagePullPolicy: {{ .Values.browserAgent.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.browserAgent.service.port }}
              protocol: TCP
          env:
            - name: REDIS_URL
              value: "redis://{{ include "myjob.redis.host" . }}:6379"
            - name: API_URL
              value: "http://{{ .Release.Name }}-api:{{ .Values.api.service.port }}"
            - name: OLLAMA_BASE_URL
              value: {{ .Values.ollama.baseUrl | default "http://ollama.ollama.svc.cluster.local:11434" | quote }}
            - name: LIVEKIT_WS_URL
              value: "ws://{{ .Release.Name }}-livekit:7880"
            - name: LOG_LEVEL
              value: {{ .Values.browserAgent.env.LOG_LEVEL | quote }}
            - name: LIVEKIT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.livekit.secretName }}
                  key: {{ .Values.secrets.livekit.keys.apiKey }}
            - name: LIVEKIT_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.livekit.secretName }}
                  key: {{ .Values.secrets.livekit.keys.apiSecret }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.browserAgent.resources | nindent 12 }}
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
{{- end }}
