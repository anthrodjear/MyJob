{{- if .Values.api.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-api
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "myjob.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  {{- if not .Values.api.autoscaling.enabled }}
  replicas: {{ .Values.api.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "myjob.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        {{- include "myjob.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      serviceAccountName: {{ .Values.serviceAccount.name }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: api
          image: {{ include "myjob.api.image" . }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.api.service.port }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.api.service.port | quote }}
            - name: APP_ENV
              value: {{ .Values.api.env.APP_ENV | quote }}
            - name: CONFIG_PATH
              value: {{ .Values.api.env.CONFIG_PATH | quote }}
            - name: DATABASE_URL
              value: "postgres://myjob:$(POSTGRES_PASSWORD)@{{ include "myjob.postgres.host" . }}:5432/myjob?sslmode=disable"
            - name: REDIS_URL
              value: "redis://{{ include "myjob.redis.host" . }}:6379"
            - name: OLLAMA_BASE_URL
              value: {{ .Values.ollama.baseUrl | default "http://ollama.ollama.svc.cluster.local:11434" | quote }}
            - name: LIVEKIT_WS_URL
              value: "ws://{{ .Release.Name }}-livekit:7880"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.database.secretName }}
                  key: {{ .Values.secrets.database.keys.password }}
            - name: AUTH_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.auth.secretName }}
                  key: {{ .Values.secrets.auth.keys.jwtSecret }}
            - name: AUTH_PASSWORD_HASH
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.auth.secretName }}
                  key: {{ .Values.secrets.auth.keys.passwordHash }}
            - name: LIVEKIT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.livekit.secretName }}
                  key: {{ .Values.secrets.livekit.keys.apiKey }}
            - name: LIVEKIT_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.livekit.secretName }}
                  key: {{ .Values.secrets.livekit.keys.apiSecret }}
          livenessProbe:
            httpGet:
              path: {{ .Values.api.healthCheck.path }}
              port: http
            initialDelaySeconds: {{ .Values.api.healthCheck.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.healthCheck.periodSeconds }}
            timeoutSeconds: {{ .Values.api.healthCheck.timeoutSeconds }}
            failureThreshold: {{ .Values.api.healthCheck.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.api.healthCheck.path }}
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
{{- end }}