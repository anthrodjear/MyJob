# values.yaml — AI Job Search Agent Helm Chart
# Override per environment in overlays/staging/values.yaml or overlays/production/values.yaml

# -- Global settings
global:
  imageRegistry: ghcr.io
  imagePullSecrets:
    - name: ghcr-secret
  storageClass: standard

# -- Namespace
namespace: myjob

# -- API Server
api:
  enabled: true
  replicaCount: 2
  image:
    repository: anthrodjear/myjob-api
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  healthCheck:
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  env:
    APP_ENV: production
    PORT: "8080"
    CONFIG_PATH: /app/config/application.yaml

# -- Worker Service
worker:
  enabled: true
  replicaCount: 2
  image:
    repository: anthrodjear/myjob-worker
    tag: "latest"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 8
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  env:
    APP_ENV: production
    QUEUE_CONCURRENCY: "10"
    CONFIG_PATH: /app/config/application.yaml

# -- Browser Agent
browserAgent:
  enabled: true
  replicaCount: 2
  image:
    repository: anthrodjear/myjob-browser-agent
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 1Gi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 60
    targetMemoryUtilizationPercentage: 70
  env:
    LOG_LEVEL: info

# -- Frontend (Next.js)
frontend:
  enabled: true
  replicaCount: 2
  image:
    repository: anthrodjear/myjob-frontend
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 3000
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  env:
    NODE_ENV: production
    NEXT_PUBLIC_API_URL: "/api"  # Routes through NGINX ingress

# -- PostgreSQL
postgres:
  enabled: true
  image:
    repository: pgvector/pgvector
    tag: "pg16"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 5432
  persistence:
    enabled: true
    size: 10Gi
    storageClass: standard
  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 1Gi
  env:
    POSTGRES_DB: myjob
    POSTGRES_USER: myjob

# -- Redis
redis:
  enabled: true
  image:
    repository: redis
    tag: "7-alpine"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 6379
  persistence:
    enabled: true
    size: 2Gi
    storageClass: standard
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

# -- Ingress
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
  hosts:
    - host: myjob.example.com
      paths:
        - path: /
          pathType: Prefix
          service: frontend
          port: 3000
        - path: /api
          pathType: Prefix
          service: api
          port: 8080
  tls:
    - secretName: myjob-tls
      hosts:
        - myjob.example.com

# -- Secrets (reference existing K8s secrets)
secrets:
  # Database password stored in K8s Secret
  database:
    secretName: myjob-database
    keys:
      password: POSTGRES_PASSWORD
  # JWT secret stored in K8s Secret
  auth:
    secretName: myjob-auth
    keys:
      jwtSecret: AUTH_JWT_SECRET
      passwordHash: AUTH_PASSWORD_HASH
  # LiveKit
  livekit:
    secretName: myjob-livekit
    keys:
      apiKey: LIVEKIT_API_KEY
      apiSecret: LIVEKIT_API_SECRET
  # Redis password
  redis:
    secretName: myjob-redis
    keys:
      password: REDIS_PASSWORD

# -- Ollama (external service, override per environment)
ollama:
  baseUrl: "http://ollama.ollama.svc.cluster.local:11434"

# -- Network Policy
networkPolicy:
  enabled: true

# -- Pod Disruption Budget
pdb:
  enabled: true
  minAvailable: 1

# -- Service Account
serviceAccount:
  create: true
  name: myjob
  annotations: {}
