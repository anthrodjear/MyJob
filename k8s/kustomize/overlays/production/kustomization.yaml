# kustomize/overlays/production/kustomization.yaml
# Production environment — full scaling, hardened

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: myjob-production

resources:
  - ../../base

patches:
  # Higher replicas for production
  - target:
      kind: Deployment
      name: myjob-api
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: Deployment
      name: myjob-worker
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3
  - target:
      kind: Deployment
      name: myjob-browser-agent
    patch: |
      - op: replace
        path: /spec/replicas
        value: 2
  - target:
      kind: Deployment
      name: myjob-frontend
    patch: |
      - op: replace
        path: /spec/replicas
        value: 3

  # Higher resource limits for production
  - target:
      kind: Deployment
      name: myjob-api
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 500m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 512Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 2000m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1Gi
  - target:
      kind: Deployment
      name: myjob-worker
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/cpu
        value: 500m
      - op: replace
        path: /spec/template/spec/containers/0/resources/requests/memory
        value: 512Mi
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/cpu
        value: 2000m
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: 1Gi

  # Larger PVC for production
  - target:
      kind: StatefulSet
      name: myjob-postgres
    patch: |
      - op: replace
        path: /spec/volumeClaimTemplates/0/spec/resources/requests/storage
        value: 50Gi
  - target:
      kind: StatefulSet
      name: myjob-redis
    patch: |
      - op: replace
        path: /spec/volumeClaimTemplates/0/spec/resources/requests/storage
        value: 10Gi

  # PDB for production
  - target:
      kind: PodDisruptionBudget
      name: myjob-api-pdb
    patch: |
      - op: replace
        path: /spec/minAvailable
        value: 2
  - target:
      kind: PodDisruptionBudget
      name: myjob-worker-pdb
    patch: |
      - op: replace
        path: /spec/minAvailable
        value: 2

configMapGenerator:
  - name: myjob-config
    literals:
      - APP_ENV=production
      - LOG_LEVEL=warn
