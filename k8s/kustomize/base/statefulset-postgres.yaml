apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: myjob-postgres
  labels:
    app.kubernetes.io/component: postgres
spec:
  serviceName: myjob-postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/component: postgres
    spec:
      containers:
        - name: postgres
          image: pgvector/pgvector:pg16
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: myjob
            - name: POSTGRES_USER
              value: myjob
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: myjob-secrets
                  key: POSTGRES_PASSWORD
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi
