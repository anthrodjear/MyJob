apiVersion: apps/v1
kind: Deployment
metadata:
  name: myjob-browser-agent
  labels:
    app.kubernetes.io/component: browser-agent
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/component: browser-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/component: browser-agent
    spec:
      containers:
        - name: browser-agent
          image: ghcr.io/OWNER/myjob-browser-agent:latest
          ports:
            - name: http
              containerPort: 3000
          resources:
            requests:
              cpu: 500m
              memory: 512Mi
            limits:
              cpu: 2000m
              memory: 1Gi
