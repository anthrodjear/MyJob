apiVersion: apps/v1
kind: Deployment
metadata:
  name: myjob-api
  labels:
    app.kubernetes.io/component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/component: api
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: api
          image: ghcr.io/anthrodjear/myjob-api:latest
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: PORT
              value: "8080"
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: myjob-config
                  key: APP_ENV
                  optional: true
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: myjob-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: myjob-secrets
                  key: REDIS_URL
            - name: AUTH_PASSWORD_HASH
              valueFrom:
                secretKeyRef:
                  name: myjob-secrets
                  key: AUTH_PASSWORD_HASH
            - name: AUTH_JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: myjob-secrets
                  key: AUTH_JWT_SECRET
            - name: CORS_ORIGINS
              value: "http://myjob.local,https://myjob.local"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
