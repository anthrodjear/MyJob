# Kustomize base: Ingress for API
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: myjob-ingress
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: api.myjob.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: myjob-api
                port:
                  name: http
    - host: myjob.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: myjob-frontend
                port:
                  name: http
