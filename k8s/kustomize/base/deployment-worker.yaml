apiVersion: apps/v1
kind: Deployment
metadata:
  name: myjob-worker
  labels:
    app.kubernetes.io/component: worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/OWNER/myjob-worker:latest
          env:
            - name: APP_ENV
              value: production
            - name: QUEUE_CONCURRENCY
              value: "10"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
