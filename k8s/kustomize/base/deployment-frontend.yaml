apiVersion: apps/v1
kind: Deployment
metadata:
  name: myjob-frontend
  labels:
    app.kubernetes.io/component: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        app.kubernetes.io/component: frontend
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: frontend
          image: ghcr.io/anthrodjear/myjob-frontend:latest
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: APP_VERSION
              valueFrom:
                configMapKeyRef:
                  name: myjob-config
                  key: APP_VERSION
                  optional: true
            - name: NEXT_PUBLIC_API_URL
              value: "http://myjob-api:8080"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
