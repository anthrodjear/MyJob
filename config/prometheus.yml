global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'api'
    static_configs:
      - targets: ['api:8080']
    metrics_path: /metrics

  - job_name: 'worker'
    static_configs:
      - targets: ['worker:9091']
    metrics_path: /metrics

  - job_name: 'browser-agent'
    static_configs:
      - targets: ['browser-agent:3000']
    metrics_path: /metrics
