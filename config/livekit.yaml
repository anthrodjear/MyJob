# LiveKit Development Configuration

# Used by docker-compose.yml for the LiveKit server.
# API key/secret match the .env.example defaults.


port: 7880
rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 60000
  use_external_ip: false

keys:
  devkey: devsecret

logging:
  level: info
