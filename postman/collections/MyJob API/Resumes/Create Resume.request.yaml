$kind: http-request
name: Create Resume
method: POST
url: '{{baseUrl}}/api/v1/resumes'
order: 3000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "name": "Software Engineer Resume",
      "specialization": "Backend Engineering",
      "template_path": "templates/resumes/base.tex",
      "focus_skills": ["Go", "PostgreSQL", "Docker"],
      "highlight_experience": []
    }
