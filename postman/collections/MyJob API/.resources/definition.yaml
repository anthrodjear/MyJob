$kind: collection
name: MyJob API
description: 'AI Job Search Agent — Backend API. All protected routes require a Bearer token (JWT) obtained from POST /auth/login.'
variables:
  - key: baseUrl
    value: 'http://localhost:8080'
  - key: accessToken
    value: ''
  - key: refreshToken
    value: ''
  - key: jobId
    value: ''
  - key: sourceId
    value: ''
  - key: applicationId
    value: ''
  - key: resumeId
    value: ''
  - key: coverLetterId
    value: ''
  - key: interviewId
    value: ''
  - key: approvalId
    value: ''
  - key: embeddingId
    value: ''
  - key: emailId
    value: ''
  - key: activityId
    value: ''
  - key: configKey
    value: ''
  - key: version
    value: ''
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{accessToken}}'
