$kind: http-request
name: Update Application Notes
method: PATCH
url: '{{baseUrl}}/api/v1/applications/{{applicationId}}/notes'
order: 6000
pathVariables:
  - key: applicationId
    value: '{{applicationId}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "notes": "Follow up in 2 weeks"
    }
