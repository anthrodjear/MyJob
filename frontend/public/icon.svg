<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#071a4a"/>
      <stop offset="50%" stop-color="#123fa8"/>
      <stop offset="100%" stop-color="#ff5a1f"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#fff36a"/>
      <stop offset="1" stop-color="#ff9d00"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="90" fill="url(#bg)"/>

  <!-- circuit lines -->
  <g fill="none" stroke="#3fb7ff" stroke-width="10" stroke-linecap="round">
    <path d="M80 220h70l35-35"/>
    <path d="M80 280h90l35-35"/>
    <path d="M432 220h-70l-35-35"/>
    <path d="M432 280h-90l-35-35"/>
  </g>

  <!-- light bulb -->
  <path d="M256 120c-65 0-95 85-45 130h90c50-45 20-130-45-130z"
        fill="url(#gold)" stroke="#fff" stroke-width="6"/>
  <rect x="220" y="250" width="72" height="30" rx="10" fill="#111827"/>

  <!-- graduation cap -->
  <path d="M160 120l96-45 96 45-96 45z" fill="#111827" stroke="#fff" stroke-width="5"/>
  <path d="M220 120v35h72v-35" fill="#0b1f55"/>

  <!-- book -->
  <path d="M90 330 Q170 300 256 345 Q342 300 422 330 V400 Q340 365 256 410 Q172 365 90 400Z"
        fill="#fff" stroke="#cbd5e1" stroke-width="6"/>

  <!-- text -->
  <text x="256" y="470" text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="70" font-weight="900"
        fill="#ffffff">MyJob</text>
</svg>
