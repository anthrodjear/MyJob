version: "2"

linters:
  default: none
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - misspell
    - goimports
    - errorlint
    - rowserrcheck
    - sqlclosecheck
    - noctx
    - bodyclose
    - nilerr

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    gosec:
      excludes:
        - G104  # Unhandled errors — we handle them via our httpresp package
    goimports:
      local-prefixes:
        - backend

issues:
  exclude-rules:
    # Test files can be more relaxed
    - path: _test\.go
      linters:
        - errcheck
        - gosec
    # Generated code
    - path: \.pb\.go
      linters:
        - errcheck
        - gosec
        - unused
  max-issues-per-linter: 50
  max-same-issues: 10

run:
  timeout: 5m
  modules-download-mode: readonly
