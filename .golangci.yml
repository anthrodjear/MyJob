version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - misspell
    - errorlint
    - rowserrcheck
    - sqlclosecheck
    - noctx
    - bodyclose
    - nilerr
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    gosec:
      excludes:
        - G104  # Unhandled errors — we handle them via our httpresp package
  exclusions:
    rules:
      # Test files can be more relaxed
      - path: _test\.go
        linters:
          - errcheck
          - gosec
      # Generated code
      - path: \.pb\.go
        linters:
          - errcheck
          - gosec
          - unused
      # Defer with Close/Rollback/Sync is almost always benign
      - linters:
          - errcheck
        text: "Error return value of `.*\\.(Close|Rollback|Sync)` is not checked"
      # RowsAffected on ExecContext is often intentionally ignored
      - linters:
          - errcheck
        text: "Error return value of `result\\.RowsAffected` is not checked"
      # os.ReadFile in config loading — file may not exist, defaults are fine
      - linters:
          - errcheck
        text: "Error return value of `os\\.ReadFile` is not checked"

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - backend

issues:
  max-issues-per-linter: 50
  max-same-issues: 10

run:
  timeout: 5m
  modules-download-mode: readonly
