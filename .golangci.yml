version: "2"

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - misspell
    - errorlint
    - rowserrcheck
    - sqlclosecheck
    - noctx
    - bodyclose
    - nilerr
  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true
    gosec:
      excludes:
        - G104  # Unhandled errors — we handle them via our httpresp package
  exclusions:
    rules:
      # Test files can be more relaxed
      - path: _test\.go
        linters:
          - errcheck
          - gosec
      # Generated code
      - path: \.pb\.go
        linters:
          - errcheck
          - gosec
          - unused

formatters:
  enable:
    - goimports
  settings:
    goimports:
      local-prefixes:
        - backend

issues:
  max-issues-per-linter: 50
  max-same-issues: 10

run:
  timeout: 5m
  modules-download-mode: readonly
